openapi: 3.1.0
info:
  title: Harmonica API
  version: 1.0.0
  description: |
    REST API for the Harmonica structured deliberation platform.
    Provides access to sessions and their data, including creating, updating, and querying sessions, plus response submission for active sessions.
  contact:
    name: Harmonica
    url: https://harmonica.chat

servers:
  - url: https://app.harmonica.chat/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

security:
  - apiKey: []

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: |
        API key authentication. Pass your key as a Bearer token.
        Keys use the format `hm_live_<32 hex chars>`.
        Generate keys from your Harmonica dashboard settings.

  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        critical:
          type: string
          nullable: true
        context:
          type: string
          nullable: true
        prompt:
          type: string
          nullable: true
          description: Custom facilitation prompt for the session's AI facilitator
        status:
          type: string
          enum: [active, completed]
        summary:
          type: string
          nullable: true
        session_md:
          type: string
          nullable: true
          description: Structured SESSION.md brief (auto-generated after summary)
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, topic, goal, status, participant_count, created_at, updated_at]

    SessionListItem:
      type: object
      description: Abbreviated session object returned in list endpoints.
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active, completed]
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, topic, goal, status, participant_count, created_at, updated_at]

    PublicSessionListItem:
      type: object
      description: Session object returned by the public discovery endpoint. Extends SessionListItem with a join URL.
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active]
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        join_url:
          type: string
          format: uri
          description: Direct URL for participants to join the session
      required: [id, topic, goal, status, participant_count, created_at, updated_at, join_url]

    Question:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        position:
          type: integer
      required: [id, text, position]

    Participant:
      type: object
      properties:
        participant_id:
          type: string
          format: uuid
        participant_name:
          type: string
          nullable: true
        active:
          type: boolean
          description: Whether the participant is still in conversation
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required: [participant_id, participant_name, active, messages]

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, role, content, created_at]

    ResponseSubmission:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 10000
      required: [content]

    ResponseCreated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        content:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, session_id, content, created_at]

    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        subscription_status:
          type: string
          enum: [FREE, PRO, ENTERPRISE]
        api_key:
          type: object
          properties:
            name:
              type: string
              nullable: true
            key_prefix:
              type: string
            created_at:
              type: string
              format: date-time
            last_used_at:
              type: string
              format: date-time
              nullable: true
      required: [id, email, subscription_status, api_key]

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [total, limit, offset]

    CreateSessionRequest:
      type: object
      description: Request body for creating a new session.
      properties:
        topic:
          type: string
          description: Session topic / title
        goal:
          type: string
          description: What the session aims to achieve
        context:
          type: string
          description: Background context for participants (e.g. SESSION.md from a prior session)
        critical:
          type: string
          description: Critical question or constraint
        prompt:
          type: string
          description: Custom facilitation prompt. If omitted, a prompt is auto-generated from topic, goal, context, and critical fields.
        template_id:
          type: string
          description: ID of a template to use
        questions:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
            required: [text]
          description: Pre-session questions shown to participants before facilitation begins
        cross_pollination:
          type: boolean
          default: false
          description: Enable cross-pollination of ideas between participant threads
        distribution:
          type: array
          items:
            $ref: '#/components/schemas/DistributionTarget'
          description: Distribution channels for the session (e.g. Telegram groups)
      required: [topic, goal]

    DistributionTarget:
      type: object
      description: A distribution channel where the session should be announced.
      properties:
        channel:
          type: string
          enum: [telegram]
          description: Distribution channel type
        group_id:
          type: string
          description: Channel-specific group identifier (e.g. Telegram chat ID)
      required: [channel, group_id]

    ChatRequest:
      type: object
      description: Send a message in a conversational facilitation session.
      properties:
        content:
          type: string
          description: The participant's message
        participant_id:
          type: string
          description: Unique identifier for the participant (e.g. Telegram user ID)
        participant_name:
          type: string
          description: Display name of the participant
      required: [content, participant_id, participant_name]

    ChatQuestionsRequest:
      type: object
      description: Submit pre-session question answers to start facilitation.
      properties:
        participant_id:
          type: string
          description: Unique identifier for the participant
        participant_name:
          type: string
          description: Display name of the participant
        answers:
          type: array
          items:
            type: object
            properties:
              question_id:
                type: string
              answer:
                type: string
            required: [question_id, answer]
      required: [participant_id, participant_name, answers]

    ChatResponse:
      type: object
      description: Facilitator response to a chat message.
      properties:
        message:
          type: object
          properties:
            role:
              type: string
              enum: [assistant]
            content:
              type: string
              description: The facilitator's response
            is_final:
              type: boolean
              description: Whether the facilitator considers this conversation complete
          required: [role, content, is_final]
        thread_id:
          type: string
          description: The participant's thread ID in this session
      required: [message, thread_id]

    SessionCreated:
      type: object
      description: Session object returned after creation. Extends SessionListItem with a join URL.
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active]
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        join_url:
          type: string
          format: uri
          description: Direct URL for participants to join the session
      required: [id, topic, goal, status, participant_count, created_at, updated_at, join_url]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - unauthorized
                - forbidden
                - not_found
                - validation_error
                - rate_limited
                - internal_error
            message:
              type: string
          required: [code, message]
      required: [error]

  parameters:
    sessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session ID

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: unauthorized
              message: Invalid or missing API key
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: forbidden
              message: You don't have access to this session
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: not_found
              message: Session not found
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: rate_limited
              message: Rate limit exceeded. Try again in 30 seconds.

paths:
  /me:
    get:
      summary: Get current user
      description: Returns user info and API key metadata for the authenticated user.
      operationId: getMe
      tags: [Account]
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions:
    post:
      summary: Create session
      description: |
        Creates a new deliberation session owned by the authenticated user.
        If `prompt` is omitted, a default facilitation prompt is used.
        Returns the created session with a `join_url` for sharing with participants.
      operationId: createSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '400':
          description: Validation error (missing required fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: topic is required
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List sessions
      description: |
        Returns sessions the authenticated user has access to (owns or participates in).
        Results are ordered by most recently updated first.
      operationId: listSessions
      tags: [Sessions]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed]
          description: Filter by session status
        - name: q
          in: query
          schema:
            type: string
          description: Search sessions by topic or goal
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of results to skip
        - name: distribution_channel
          in: query
          schema:
            type: string
            enum: [telegram]
          description: Filter by distribution channel
        - name: distribution_group_id
          in: query
          schema:
            type: string
          description: Filter by distribution group ID
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                required: [data, pagination]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/public:
    get:
      summary: List public sessions
      description: |
        Returns active sessions that hosts have marked as publicly accessible.
        No authentication required. Rate-limited by IP address (100 req/min).
        Use this endpoint to discover participation opportunities.
      operationId: listPublicSessions
      tags: [Public]
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search sessions by topic or goal
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of results to skip
      responses:
        '200':
          description: List of public sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicSessionListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                required: [data, pagination]
        '429':
          $ref: '#/components/responses/RateLimited'

  /sessions/{id}:
    get:
      summary: Get session
      description: Returns full details of a session the user has access to.
      operationId: getSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update session
      description: |
        Update session metadata. At least one field must be provided.
        Requires editor role or higher on the session.
      operationId: updateSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                goal:
                  type: string
                context:
                  type: string
                critical:
                  type: string
                prompt:
                  type: string
                  description: Custom facilitation prompt for the AI facilitator
              minProperties: 1
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Validation error (no valid fields provided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: "No valid fields provided. Allowed fields: topic, goal, context, critical, prompt"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/questions:
    get:
      summary: Get session questions
      description: Returns the facilitation questions/prompts for a session.
      operationId: getSessionQuestions
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Question'
                required: [data]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/responses:
    get:
      summary: Get session responses
      description: |
        Returns all participant responses for a session, grouped by participant.
        Each participant's conversation thread includes both user messages and assistant (facilitator) messages.
      operationId: getSessionResponses
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Participant responses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Participant'
                required: [data]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Submit a response
      description: |
        Submit a response to an active session as the authenticated user.
        The session must be active and the user must have at least editor access.
      operationId: submitResponse
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponseSubmission'
      responses:
        '201':
          description: Response submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseCreated'
        '400':
          description: Validation error (empty content, session not active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: Session is not active
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/session-md:
    get:
      summary: Get session brief
      description: |
        Returns the structured SESSION.md brief as raw markdown.
        Auto-generated after summary creation. Returns 404 if not yet generated.
      operationId: getSessionMd
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: SESSION.md brief
          content:
            text/markdown:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/summary:
    get:
      summary: Get session summary
      description: |
        Returns the AI-generated summary for a completed session.
        Returns null summary if the session hasn't been summarized yet.
      operationId: getSessionSummary
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    format: uuid
                  summary:
                    type: string
                    nullable: true
                  generated_at:
                    type: string
                    format: date-time
                    nullable: true
                required: [session_id, summary]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/chat:
    post:
      summary: Send chat message
      description: |
        Send a message to a session's AI facilitator as a specific participant.
        The facilitator responds in a conversational style, guiding the participant
        through the deliberation topic. When the facilitator considers the conversation
        complete, `is_final` is set to `true`.

        This endpoint powers channel integrations (e.g. Telegram bot) where participants
        interact with the facilitator outside the web app.
      operationId: chatMessage
      tags: [Chat]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Facilitator response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Validation error (missing fields, session not active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/chat/questions:
    post:
      summary: Submit pre-session answers
      description: |
        Submit answers to a session's pre-session questions and receive the
        facilitator's opening message. This starts the facilitation for the participant.

        Call this once per participant before using the `/chat` endpoint.
        The answers are passed to the facilitator as context for the conversation.
      operationId: submitChatQuestions
      tags: [Chat]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatQuestionsRequest'
      responses:
        '200':
          description: Facilitator opening message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Validation error (missing fields, session not active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
